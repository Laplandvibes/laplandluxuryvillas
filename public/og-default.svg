<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="aurora" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050913"/>
      <stop offset="60%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#08101F"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#aurora)"/>

  <!-- Brass hairline frame -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#C9A46B" stroke-opacity="0.35" stroke-width="1"/>

  <!-- Eyebrow rule -->
  <line x1="500" y1="190" x2="560" y2="190" stroke="#C9A46B" stroke-opacity="0.7" stroke-width="1"/>
  <text x="600" y="195" text-anchor="middle"
        font-family="DM Sans, Helvetica, Arial, sans-serif"
        font-size="14" letter-spacing="3" fill="#C9A46B">THE PRIVATE COLLECTION</text>
  <line x1="640" y1="190" x2="700" y2="190" stroke="#C9A46B" stroke-opacity="0.7" stroke-width="1"/>

  <!-- Headline -->
  <text x="600" y="280" text-anchor="middle"
        font-family="Cormorant Garamond, Playfair Display, Georgia, serif"
        font-size="64" fill="#F9FAFB">Lapland Luxury Villas</text>
  <text x="600" y="350" text-anchor="middle"
        font-family="Cormorant Garamond, Playfair Display, Georgia, serif"
        font-style="italic" font-size="36" fill="#E8E2D6" opacity="0.85">Private aurora residences &amp; suites</text>

  <!-- Logo line -->
  <text x="600" y="475" text-anchor="middle"
        font-family="Cormorant Garamond, Playfair Display, Georgia, serif"
        font-size="22" letter-spacing="2" fill="#F9FAFB">
    <tspan fill="#EC4899">#</tspan>LAPLAND<tspan fill="#EC4899" dx="6">LUXURY VILLAS</tspan>
  </text>
  <line x1="450" y1="510" x2="750" y2="510" stroke="#C9A46B" stroke-opacity="0.4" stroke-width="1"/>
  <text x="600" y="540" text-anchor="middle"
        font-family="DM Sans, Helvetica, Arial, sans-serif"
        font-size="13" letter-spacing="3" fill="#C9A46B">PRIVATE@LAPLANDVIBES.COM</text>
</svg>
